<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工资明细查询系统 (安全修复版)</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #1a5fb4; --bg-color: #f4f6f9; --card-bg: #ffffff; --text-color: #333; }
        body { font-family: "Microsoft YaHei", sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        .main-header { text-align: center; margin-bottom: 30px; cursor: pointer; transition: opacity 0.3s; user-select: none; }
        .main-header:hover { opacity: 0.8; }
        .main-header h1 { display: inline-block; vertical-align: middle; margin: 0; color: var(--primary-color); font-size: 28px; }
        .main-header .logo { font-size: 32px; vertical-align: middle; margin-right: 10px; display: inline-block; }
        .admin-hint { font-size: 12px; color: #999; margin-top: 5px; opacity: 0; transition: opacity 0.3s; }
        .main-header:hover .admin-hint { opacity: 1; }

        .card { background: var(--card-bg); border-radius: 8px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { display: inline-block; padding: 12px 20px; background: var(--primary-color); color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; text-align: center; width: 100%; box-sizing: border-box; transition: background 0.2s; }
        .btn:hover { background: #164d8f; }
        .btn-danger { background: #e74c3c; }
        .btn-secondary { background: #95a5a6; margin-top: 10px; }
        
        input[type="text"], input[type="password"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary-color); box-shadow: 0 0 5px rgba(26, 95, 180, 0.2); }
        
        .preview-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        .preview-table th, .preview-table td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .preview-table th { background: #f8f9fa; font-weight: 600; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; background: #d4edda; color: #155724; }
        
        .result-card { display: none; text-align: left; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .result-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .result-item:last-child { border-bottom: none; }
        .result-label { color: #666; font-weight: 500; min-width: 100px; }
        .result-value { color: #333; text-align: right; flex: 1; margin-left: 10px; word-break: break-all; font-family: "Courier New", monospace; }
        .highlight { color: var(--primary-color); font-weight: bold; font-size: 1.1em; }
        
        .alert { padding: 12px; background: #f8d7da; color: #721c24; border-radius: 5px; margin-top: 15px; display: none; text-align: center; font-size: 14px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="main-header" onclick="enterAdminMode()">
        <span class="logo">💰</span>
        <h1>工资明细查询系统</h1>
        <div class="admin-hint">点击图标进入管理后台</div>
    </div>

    <div id="admin-panel" class="card hidden">
        <h3 style="margin-top:0; color:var(--primary-color);">📂 智能导入工资表</h3>
        <p style="font-size: 13px; color: #666; margin-bottom: 20px;">
            系统会自动识别表头。请确保 Excel 中包含 <b>“姓名”</b> 和 <b>“密码”</b> 列。
        </p>
        
        <input type="file" id="file-upload" accept=".xlsx, .xls">
        <button class="btn" onclick="handleFile()">生成并保存工资条</button>
        <div id="status-msg" style="margin-top:15px; color: green; font-weight: bold; font-size: 14px;"></div>

        <hr style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">

        <h3 style="color:var(--primary-color);">🛠️ 系统维护</h3>
        <button class="btn btn-danger" onclick="clearData()">🗑️ 清除所有工资数据</button>
        <button class="btn btn-secondary" onclick="exitAdminMode()">🔙 返回员工查询页</button>

        <h3 style="margin-top: 25px; color:var(--primary-color);">👁️ 数据预览 (前10条)</h3>
        <div id="preview-container" style="overflow-x: auto;"></div>
    </div>

    <div id="emp-panel" class="card">
        <div style="text-align: center; padding: 10px 0;">
            <h3 style="margin-bottom: 25px; color: #555;">🔍 员工登录</h3>
            <input type="text" id="query-name" placeholder="请输入姓名">
            <input type="password" id="query-pwd" placeholder="请输入查询密码">
            <button class="btn" onclick="querySalary()">安全登录</button>
            <div id="error-msg" class="alert"></div>
        </div>

        <div id="result-card" class="result-card">
            <div style="border-bottom: 2px solid var(--primary-color); padding-bottom: 15px; margin-bottom: 20px; text-align: center;">
                <h2 style="margin:0; color:var(--primary-color);" id="res-name"></h2>
                <p style="margin:5px 0 0; color:#999; font-size:14px;" id="res-month"></p>
            </div>
            <div id="result-content"></div>
        </div>
    </div>
</div>

<script>
    let currentMonth = new Date().toISOString().slice(0, 7);

    window.onload = function() { 
        renderPreview(); 
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('emp-panel').classList.remove('hidden');
    };

    function enterAdminMode() {
        const password = prompt("🔒 请输入管理员密码:");
        if (password === 'admina') {
            document.getElementById('emp-panel').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            window.scrollTo(0, 0);
        } else if (password !== null) {
            alert("密码错误！");
        }
    }

    function exitAdminMode() {
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('emp-panel').classList.remove('hidden');
    }

    // --- 安全修复后的文件处理逻辑 ---
    function handleFile() {
        const fileInput = document.getElementById('file-upload');
        if (fileInput.files.length === 0) { 
            showStatus("请先选择文件！", "error"); 
            return; 
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];

                // 读取所有行
                const rawData = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: "" });
                if (!rawData || rawData.length === 0) { 
                    showStatus("文件为空或格式错误！", "error"); 
                    return; 
                }

                // 智能寻找表头
                let headerRowIndex = -1;
                let headerKeys = [];

                for (let i = 0; i < rawData.length; i++) {
                    if (!rawData[i]) continue; // 跳过空行
                    const rowText = JSON.stringify(rawData[i]);
                    if (rowText.includes('姓名') && rowText.includes('密码')) {
                        headerRowIndex = i;
                        headerKeys = rawData[i].map(h => String(h).trim());
                        break;
                    }
                }

                if (headerRowIndex === -1) {
                    showStatus("❌ 无法识别表头！\n请确保 Excel 第一行包含“姓名”和“密码”这两个列名。", "error");
                    return;
                }

                // 提取数据
                const dataRows = rawData.slice(headerRowIndex + 1);
                const processedData = [];
                for(const row of dataRows) {
                    if (!row) continue; // 跳过空行
                    
                    let obj = {};
                    for (let j = 0; j < headerKeys.length; j++) {
                        let val = row[j];
                        if (typeof val === 'number') {
                            val = String(Math.floor(val));
                        }
                        obj[headerKeys[j]] = val || ''; // 防止 undefined
                    }
                    
                    const nameKey = headerKeys.find(k => k.includes('姓名'));
                    const pwdKey = headerKeys.find(k => k.includes('密码'));
                    
                    if(nameKey && pwdKey && obj[nameKey] && obj[pwdKey]) {
                        processedData.push({
                            name: String(obj[nameKey]).trim(),
                            password: String(obj[pwdKey]).trim(),
                            details: obj
                        });
                    }
                }

                if (processedData.length === 0) {
                    showStatus("未提取到有效数据，请检查表格格式。", "error");
                    return;
                }

                // 保存
                localStorage.setItem('salary_data', JSON.stringify(processedData));
                showStatus(`✅ 成功保存 ${processedData.length} 条记录！`, "success");
                renderPreview();

            } catch (err) {
                console.error(err);
                showStatus("解析出错：" + err.message, "error");
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function showStatus(message, type) {
        const statusEl = document.getElementById('status-msg');
        statusEl.innerText = message;
        statusEl.style.color = type === 'error' ? '#e74c3c' : 'green';
    }

    function renderPreview() {
        let data;
        try {
            data = JSON.parse(localStorage.getItem('salary_data')) || [];
        } catch (e) {
            console.error("数据解析失败:", e);
            data = [];
        }
        
        const container = document.getElementById('preview-container');
        if (data.length === 0) { 
            container.innerHTML = '<p style="color:#999; text-align:center;">暂无数据</p>'; 
            return; 
        }

        // 确保数据有效
        if (!Array.isArray(data) || !data[0] || !data[0].details) {
             container.innerHTML = '<p style="color:#999; text-align:center;">数据格式异常</p>'; 
             return;
        }

        const keys = Object.keys(data[0].details).filter(k => !k.includes('姓名') && !k.includes('密码'));
        let html = '<table class="preview-table"><thead><tr>';
        keys.forEach(k => html += `<th>${k}</th>`);
        html += '<th>状态</th></tr></thead><tbody>';

        data.slice(0, 10).forEach(row => {
            html += '<tr>';
            keys.forEach(k => {
                let val = row.details[k] || 'N/A';
                if (String(val).length > 15) val = String(val).substring(0, 15) + '...';
                html += `<td>${val}</td>`;
            });
            html += '<td><span class="status-badge">已保存</span></td></tr>';
        });
        container.innerHTML = html;
    }

    function clearData() {
        if (confirm("确定清除所有数据？")) {
            localStorage.removeItem('salary_data');
            renderPreview();
            showStatus("数据已清除", "success");
        }
    }

    // --- 安全修复后的查询逻辑 ---
    function querySalary() {
        const name = document.getElementById('query-name').value.trim();
        const inputPwd = document.getElementById('query-pwd').value.trim();
        const errorMsg = document.getElementById('error-msg');
        const resultCard = document.getElementById('result-card');
        
        errorMsg.style.display = 'none';
        resultCard.style.display = 'none';

        if (!name || !inputPwd) { 
            showError("请输入姓名和密码"); 
            return; 
        }

        let data;
        try {
            data = JSON.parse(localStorage.getItem('salary_data')) || [];
        } catch (e) {
            console.error("查询时数据解析失败:", e);
            showError("数据加载失败，请刷新页面重试。");
            return;
        }

        if (!Array.isArray(data)) {
            showError("数据格式异常，请联系管理员。");
            return;
        }
        
        // 安全的查找逻辑
        let match = null;
        for(const row of data) {
            if(row && row.name === name && row.password === inputPwd) {
                match = row;
                break;
            }
        }

        if (match) {
            document.getElementById('res-name').innerText = match.name || '未知';
            document.getElementById('res-month').innerText = "工资详情";
            
            let html = '';
            if (match.details) {
                Object.keys(match.details).forEach(key => {
                    if (key.includes('姓名') || key.includes('密码')) return;
                    const isPay = key.includes('实发') || key.includes('合计') || key.includes('应发');
                    html += `
                        <div class="result-item">
                            <span class="result-label">${key}:</span>
                            <span class="result-value ${isPay ? 'highlight' : ''}">${match.details[key] || 'N/A'}</span>
                        </div>
                    `;
                });
            } else {
                 html = '<p style="text-align:center; color: #999;">暂无详细数据</p>';
            }
            
            document.getElementById('result-content').innerHTML = html;
            resultCard.style.display = 'block';
        } else {
            showError("姓名或密码错误，请重试。");
        }
    }

    function showError(message) {
        const el = document.getElementById('error-msg');
        el.innerText = message;
        el.style.display = 'block';
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业工资条查询系统 (云端版)</title>
    
    <!-- 必须的库：Excel 解析库 (原代码缺失，已补全) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Firebase SDK (保持版本一致) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- 基础样式保持不变 --- */
        :root { --primary-color: #1a5fb4; --bg-color: #f4f6f9; --card-bg: #ffffff; --text-color: #333; }
        body { font-family: "Microsoft YaHei", sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* --- 新增：配置区域样式 --- */
        #config-panel {
            background: #fff3cd; border: 1px solid #ffeeba; color: #856404;
            padding: 20px; border-radius: 8px; margin-bottom: 20px;
            font-family: monospace; font-size: 13px;
        }
        #config-panel h3 { margin-top: 0; font-size: 16px; }
        #config-input {
            width: 100%; height: 150px; margin-top: 10px; padding: 10px;
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
            font-family: monospace; font-size: 12px;
        }
        #save-config-btn {
            background: #856404; color: white; border: none; padding: 8px 16px;
            margin-top: 10px; cursor: pointer; border-radius: 4px;
        }
        #save-config-btn:hover { background: #6d5000; }

        /* --- 原有样式 --- */
        .main-header { text-align: center; margin-bottom: 30px; cursor: pointer; }
        .main-header h1 { color: var(--primary-color); }
        .card { background: var(--card-bg); border-radius: 8px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { display: inline-block; padding: 12px 20px; background: var(--primary-color); color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .btn-danger { background: #e74c3c; }
        .btn-secondary { background: #95a5a6; margin-top: 10px; }
        input[type="text"], input[type="password"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .preview-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 14px; }
        .preview-table th, .preview-table td { border: 1px solid #eee; padding: 10px; text-align: left; }
        .status-badge { background: #d4edda; color: #155724; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .result-card { display: none; text-align: left; animation: fadeIn 0.3s; }
        .result-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .highlight { color: var(--primary-color); font-weight: bold; }
        .hidden { display: none; }
        .loading { color: #666; font-size: 12px; margin-top: 5px; display: none; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    
    <!-- ========================================== -->
    <!-- 🔧 1. 配置区域 (请在这里粘贴你的 Firebase 信息) -->
    <!-- ========================================== -->
    <div id="config-panel">
        <h3>⚙️ 第一步：配置 Firebase 连接信息</h3>
        <p>请在 Firebase 控制台获取配置代码，粘贴到下方框中，然后点击保存。</p>
        <textarea id="config-input" placeholder="在此粘贴 const firebaseConfig = { ... } 中的大括号内容..."></textarea>
        <button id="save-config-btn" onclick="saveConfig()">💾 保存配置并刷新页面</button>
    </div>

    <!-- ========================================== -->
    <!-- 🏠 2. 主界面 (配置完成后显示) -->
    <!-- ========================================== -->
    <div id="main-app" class="hidden">
        <div class="main-header" onclick="enterAdminMode()">
            <h1>💰 企业工资条查询系统</h1>
            <div style="font-size: 12px; color: #999;">(点击标题进入管理员模式)</div>
        </div>

        <!-- 管理员面板 -->
        <div id="admin-panel" class="card hidden">
            <h3 style="color:var(--primary-color);">📂 智能导入工资表</h3>
            <input type="file" id="file-upload" accept=".xlsx, .xls">
            <button class="btn" id="btn-upload" onclick="handleFile()">上传并同步到云端</button>
            <div class="loading" id="upload-loading">正在上传...</div>
            <hr>
            <button class="btn btn-danger" onclick="clearData()">🗑️ 清空云端所有数据</button>
            <button class="btn btn-secondary" onclick="exitAdminMode()">🔙 返回查询页</button>
            <div id="preview-container" style="margin-top:20px; overflow-x:auto;"></div>
        </div>

        <!-- 员工查询面板 -->
        <div id="emp-panel" class="card">
            <h3 style="text-align:center; color:#555;">🔍 员工登录</h3>
            <input type="text" id="query-name" placeholder="请输入姓名">
            <input type="password" id="query-pwd" placeholder="请输入查询密码">
            <button class="btn" onclick="querySalary()">安全登录</button>
            
            <div id="result-card" class="result-card">
                <div style="border-bottom: 2px solid var(--primary-color); padding-bottom: 15px; margin-bottom: 20px; text-align: center;">
                    <h2 id="res-name" style="margin:0; color:var(--primary-color);"></h2>
                    <p id="res-month" style="color:#999;"></p>
                </div>
                <div id="result-content"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 3. 核心逻辑脚本
    // ============================================================
    
    // 默认空配置
    let firebaseConfig = {};
    let db, salaryRef;
    let allData = [];

    // 页面加载时检查配置
    window.onload = function() {
        const savedConfig = localStorage.getItem('my_firebase_config');
        if (savedConfig) {
            try {
                firebaseConfig = JSON.parse(savedConfig);
                initApp();
            } catch (e) {
                alert("配置格式错误，请重新粘贴。");
                localStorage.removeItem('my_firebase_config');
            }
        } else {
            // 如果没有配置，显示黄色面板
            document.getElementById('config-panel').style.display = 'block';
            document.getElementById('main-app').style.display = 'none';
        }
    };

    // 保存配置函数
    function saveConfig() {
        const input = document.getElementById('config-input').value;
        try {
            // 尝试解析用户粘贴的内容
            // 用户可能粘贴的是完整的 "const firebaseConfig = {...}" 或者只是 "{...}"
            let configObj = {};
            
            if (input.includes('apiKey')) {
                // 如果是完整代码，尝试提取大括号内容
                const jsonStr = input.substring(input.indexOf('{'), input.lastIndexOf('}') + 1);
                configObj = new Function('return ' + jsonStr)();
            } else {
                // 如果直接是 JSON
                configObj = JSON.parse(input);
            }

            if (!configObj.apiKey) throw new Error("缺少 apiKey");

            localStorage.setItem('my_firebase_config', JSON.stringify(configObj));
            alert("配置保存成功！页面即将刷新。");
            location.reload();

        } catch (e) {
            alert("解析失败：请确保粘贴的是正确的 JavaScript 对象格式。\n错误信息: " + e.message);
        }
    }

    // 初始化 Firebase
    function initApp() {
        document.getElementById('config-panel').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.database();
        salaryRef = db.ref('payrolls');
        
        loadAndCacheData();
    }

    // --- 以下为原有业务逻辑 (未修改) ---
    async function loadAndCacheData() {
        if(!db) return;
        try {
            const snapshot = await salaryRef.once('value');
            const data = snapshot.val();
            allData = Array.isArray(data) ? data : [];
        } catch (e) { console.error(e); }
    }

    function enterAdminMode() {
        if (!db) return;
        const pwd = prompt("🔒 管理员密码 (默认 admin):");
        if (pwd === 'admin') {
            document.getElementById('emp-panel').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            renderPreview();
        } else if (pwd !== null) { alert("密码错误"); }
    }

    function exitAdminMode() {
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('emp-panel').classList.remove('hidden');
    }

    async function handleFile() {
        const fileInput = document.getElementById('file-upload');
        if (fileInput.files.length === 0) { alert("请选择文件"); return; }
        
        const btn = document.getElementById('btn-upload');
        btn.disabled = true; btn.innerText = "处理中...";

        const reader = new FileReader();
        reader.onload = async function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const ws = wb.Sheets[wb.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(ws, {header: 1, defval: ""});

                // 简单的表头查找逻辑
                let headerIdx = 0;
                let headers = json[0];
                // 假设第一行就是表头，或者寻找包含"姓名"的行
                for(let i=0; i<Math.min(5, json.length); i++) {
                    if(JSON.stringify(json[i]).includes("姓名")) { headerIdx = i; headers = json[i]; break; }
                }

                const rows = json.slice(headerIdx + 1);
                const processed = rows.map(row => {
                    let obj = {};
                    headers.forEach((h, i) => { obj[String(h).trim()] = row[i]; });
                    // 简单提取姓名密码作为索引
                    const nameKey = Object.keys(obj).find(k => k.includes("姓名"));
                    const pwdKey = Object.keys(obj).find(k => k.includes("密码"));
                    return {
                        name: obj[nameKey] || "",
                        password: obj[pwdKey] || "",
                        details: obj
                    };
                }).filter(i => i.name);

                await salaryRef.set(processed);
                alert(`成功上传 ${processed.length} 条数据`);
                allData = processed;
                renderPreview();
            } catch(err) { alert("错误: " + err.message); }
            finally { btn.disabled = false; btn.innerText = "上传并同步"; }
        };
        reader.readAsArrayBuffer(fileInput.files[0]);
    }

    async function renderPreview() {
        const container = document.getElementById('preview-container');
        if (allData.length === 0) { container.innerHTML = "暂无数据"; return; }
        
        const keys = Object.keys(allData[0].details || {}).filter(k => !k.includes('姓名') && !k.includes('密码'));
        let html = '<table class="preview-table"><thead><tr>';
        keys.forEach(k => html += `<th>${k}</th>`);
        html += '</tr></thead><tbody>';
        
        allData.slice(0, 5).forEach(row => {
            html += '<tr>';
            keys.forEach(k => html += `<td>${row.details[k]}</td>`);
            html += '</tr>';
        });
        container.innerHTML = html + '</tbody></table>';
    }

    async function clearData() {
        if(confirm("确定清空？")) {
            await salaryRef.remove();
            alert("已清空");
            allData = [];
            renderPreview();
        }
    }

    async function querySalary() {
        const name = document.getElementById('query-name').value.trim();
        const pwd = document.getElementById('query-pwd').value.trim();
        if (!name || !pwd) return;

        if (allData.length === 0) await loadAndCacheData();

        const match = allData.find(i => i.name === name && i.password === pwd);
        if (match) {
            document.getElementById('res-name').innerText = match.name;
            let html = '';
            Object.keys(match.details).forEach(k => {
                if(!k.includes('姓名') && !k.includes('密码')) {
                    html += `<div class="result-item"><span>${k}</span><span class="highlight">${match.details[k]}</span></div>`;
                }
            });
            document.getElementById('result-content').innerHTML = html;
            document.getElementById('result-card').style.display = 'block';
        } else {
            alert("未找到匹配记录");
        }
    }
</script>

</body>
</html>
